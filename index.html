<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Editor de Notícias</title>

<link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>

<style>
body {
  margin: 0;
  font-family: Verdana, Arial, sans-serif;

  background-image: url("https://i.imgur.com/yOSzr74.png");
  background-repeat: repeat;
  background-color: #d9d9d9;

  text-align: center;
}

.container {
  margin-top: 40px;
}

.logo {
  margin-bottom: 20px;
}

.logo img {
  display: inline-block;
}

/* WINDOW */
.window {
  width: 580px;
  height: 750px;
  margin: auto;

  background: #e6e6e6;
  border: 1px solid #888;
  border-radius: 14px;

  box-shadow: 0 4px 0 #666;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.window-header {
  background: #d0d0d0;
  color: #222;
  padding: 10px;
  font-weight: bold;
  border-bottom: 1px solid #999;
}

.window-body {
  flex: 1;
  padding: 10px;
  background: #ededed;
  display: flex;
  flex-direction: column;
}

/* EDITOR */
#editor {
  height: 580px;
  background: #fff;
  border: 1px solid #999;
  border-radius: 8px;
}

/* TOOLBAR */
.ql-toolbar {
  border: 1px solid #999 !important;
  background: #f2f2f2;
  border-radius: 6px;
  margin-bottom: 6px;
}

.ql-toolbar button {
  border: 1px solid #aaa !important;
  background: #fafafa;
  margin: 2px;
}

.ql-toolbar button:hover {
  background: #e0e0e0;
}

.ql-editor {
  font-family: Verdana, Arial, sans-serif !important;
  font-size: 11px !important;
}

/* BUTTONS */
.btn-row {
  display: flex;
  gap: 6px;
  margin-bottom: 6px;
}

.icon-btn {
  padding: 5px 10px;
  border: 1px solid #888;
  background: #fff;
  cursor: pointer;

  font-size: 12px;
  font-weight: bold;
  border-radius: 6px;
}

.icon-btn:hover {
  background: #eaeaea;
}

/* IMAGE POPUP */
.modal {
  display: none;
  position: absolute;
  top: 180px;
  left: 50%;
  transform: translateX(-50%);
  width: 320px;

  background: #fff;
  border: 2px solid #333;
  border-radius: 10px;
  box-shadow: 0 6px 0 #666;

  padding: 10px;
  z-index: 999;
}

.modal input {
  width: 100%;
  padding: 6px;
  border: 1px solid #999;
  border-radius: 6px;
  margin-bottom: 8px;
}

/* 🌈 COLOR POPUP */
#colorPopup {
  display: none;
  position: absolute;
  top: 180px;
  left: 50%;
  transform: translateX(-50%);

  background: #fff;
  border: 2px solid #333;
  border-radius: 10px;
  padding: 10px;

  box-shadow: 0 6px 0 #666;
  z-index: 999;
}

#hexInput {
  margin-top: 8px;
  width: 120px;
  padding: 5px;
  border: 1px solid #999;
  border-radius: 6px;
  text-align: center;
}

/* FOOTER */
.footer {
  background: #fff;
  border-top: 1px solid #aaa;
  padding: 8px;
  font-size: 11px;
  font-weight: bold;
  color: #333;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">
    <img id="siteLogo" src="https://i.imgur.com/RWc63WZ.png">
  </div>

  <div class="window">

    <div class="window-header">
      Lella - Editor de Notícias
    </div>

    <div class="window-body">

      <div class="btn-row">
        <button class="icon-btn" onclick="openModal()">🖼 Imagem via URL</button>
        <button class="icon-btn" onclick="exportHTML()">📥 Copiar HTML</button>
        <button class="icon-btn" onclick="toggleColorPicker()">🎨 Roleta de Cores</button>
      </div>

      <div id="editor"></div>

      <!-- IMAGE -->
      <div class="modal" id="imgModal">
        <input type="text" id="imageURL" placeholder="URL da imagem">
        <button onclick="insertImage()">Inserir</button>
        <button onclick="closeModal()">Fechar</button>
      </div>

      <!-- 🌈 COLOR -->
      <div id="colorPopup">
        <div id="colorWheel"></div>

        <!-- HEX INPUT -->
        <input id="hexInput" type="text" placeholder="#000000">
      </div>

    </div>

    <div class="footer">
      Desenvolvido por Horus | 2026
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>

<script>

var quill = new Quill('#editor', {
  theme: 'snow',
  modules: {
    toolbar: [
      ['bold', 'italic', 'underline'],
      [{ 'color': [] }, { 'background': [] }],
      [{ 'align': [] }],
      [{ 'list': 'ordered'}, { 'list': 'bullet' }],
      ['link'],
      ['clean']
    ]
  }
});

quill.root.style.fontFamily = "Verdana";
quill.root.style.fontSize = "11px";

/* IMAGE */
function openModal() {
  document.getElementById("imgModal").style.display = "block";
}

function closeModal() {
  document.getElementById("imgModal").style.display = "none";
}

function insertImage() {
  const url = document.getElementById("imageURL").value;
  if (url) {
    quill.insertEmbed(quill.getSelection().index, 'image', url);
    document.getElementById("imageURL").value = "";
    closeModal();
  }
}

/* EXPORT */
function exportHTML() {
  const html = quill.root.innerHTML;
  navigator.clipboard.writeText(html);
  alert("HTML copiado!");
}

/* 🌈 COLOR WHEEL + HEX */
let colorOpen = false;

var colorPicker = new iro.ColorPicker("#colorWheel", {
  width: 150,
  color: "#4da6ff"
});

function applyColor(hex) {
  quill.format("color", hex);
}

/* roda -> input */
colorPicker.on("color:change", function(color) {
  document.getElementById("hexInput").value = color.hexString;
  applyColor(color.hexString);
});

/* input -> roda */
document.getElementById("hexInput").addEventListener("input", function(e) {
  const value = e.target.value;

  if(/^#([0-9A-F]{3}){1,2}$/i.test(value)) {
    colorPicker.color.set(value);
    applyColor(value);
  }
});

function toggleColorPicker() {
  const popup = document.getElementById("colorPopup");

  colorOpen = !colorOpen;
  popup.style.display = colorOpen ? "block" : "none";

  if (colorOpen) {
    colorPicker.color.set("#4da6ff");
    document.getElementById("hexInput").value = "#4da6ff";
  }
}

/* click fora */
document.addEventListener("click", function(e) {
  const popup = document.getElementById("colorPopup");

  if (!popup.contains(e.target) && !e.target.closest(".icon-btn")) {
    popup.style.display = "none";
    colorOpen = false;
  }
});

</script>

</body>
</html>
</html>
